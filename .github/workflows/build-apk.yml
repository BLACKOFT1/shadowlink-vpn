name: Build ShadowLink VPN Pro APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compiler l'APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configurer JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Installer Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Configurer Android SDK
        uses: android-actions/setup-android@v3

      - name: Installer les paquets SDK requis
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Build APK Debug
        run: gradle assembleDebug --stacktrace

      - name: Build APK Release (non signé)
        run: gradle assembleRelease --stacktrace
        continue-on-error: true

      - name: Upload APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: ShadowLinkVPN-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload APK Release
        uses: actions/upload-artifact@v4
        with:
          name: ShadowLinkVPN-release-unsigned
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
        continue-on-error: true
